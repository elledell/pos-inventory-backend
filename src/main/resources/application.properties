spring.application.name=demo
# --- SERVER CONFIGURATION ---
# The port your backend will run on
server.port=8080

# --- DATABASE CONNECTION ---
# Replace 'inventory_db' if you want to name your database something else
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC

# Your local MySQL username (usually 'root')
spring.datasource.username=root

# IMPORTANT: Change this to your actual MySQL password!
spring.datasource.password=hellen254

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HIBERNATE / JPA SETTINGS ---
# 'update' tells Spring Boot to automatically create the tables based on your Java code
spring.jpa.hibernate.ddl-auto=update

# This prints the SQL queries in the console so you can see what is happening
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect