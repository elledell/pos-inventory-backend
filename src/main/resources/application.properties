spring.application.name=demo

# --- SERVER CONFIGURATION ---
# Use Railway's assigned port in production, but default to 8080 on your laptop
server.port=${PORT:8080}

# --- DATABASE CONNECTION ---
# Use Railway's MySQL URL in production, but default to your local DB on your laptop
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC}

# Use Railway's username, default to root locally
spring.datasource.username=${MYSQLUSER:root}

# Use Railway's password, default to local password locally
spring.datasource.password=${MYSQLPASSWORD:hellen254}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HIBERNATE / JPA SETTINGS ---
# Keep 'update' so Railway builds your tables automatically!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect